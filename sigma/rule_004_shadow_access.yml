title: Unauthorized Shadow File Access
id: d4e5f6a7-b8c9-0123-defa-234567890123
status: experimental
description: >
  Detects access to /etc/shadow by processes outside
  the known whitelist. Uses auditd key field set by
  audit rule: -w /etc/shadow -p rwa -k shadow_access
author: Yuvraj Pandey
date: 2026/06/04
tags:
    - attack.credential_access
    - attack.t1003.008
logsource:
    product: linux
    service: auditd
detection:
    selection:
        key: 'shadow_access'
    condition: selection
falsepositives:
    - passwd, sudo, unix_chkpwd — filtered by Python rule whitelist
references:
    - https://attack.mitre.org/techniques/T1003/008/
level: high